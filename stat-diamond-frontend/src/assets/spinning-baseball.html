<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinning Baseball</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0d0d0d;
      overflow: hidden;
    }

    .scene {
      perspective: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .baseball-wrapper {
      animation: spin 1.8s linear infinite;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.6))
             drop-shadow(0 0 60px rgba(201, 168, 76, 0.08));
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Subtle floating effect */
    .float-container {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Ground shadow */
    .shadow {
      width: 120px;
      height: 16px;
      background: radial-gradient(ellipse, rgba(201, 168, 76, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      margin: 30px auto 0;
      animation: shadow-pulse 3s ease-in-out infinite;
    }

    @keyframes shadow-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.75); opacity: 0.5; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="scene">
      <div class="float-container">
        <div class="baseball-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
            <defs>
              <!-- Baseball leather gradient -->
              <radialGradient id="ball-gradient" cx="40%" cy="35%" r="55%">
                <stop offset="0%" stop-color="#faf8f2"/>
                <stop offset="40%" stop-color="#f0ece0"/>
                <stop offset="75%" stop-color="#e0d8c8"/>
                <stop offset="100%" stop-color="#c8bfa8"/>
              </radialGradient>

              <!-- Subtle leather texture via filter -->
              <filter id="leather">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
                <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
                <feBlend in="SourceGraphic" in2="gray-noise" mode="soft-light"/>
              </filter>

              <!-- Inner shadow -->
              <filter id="inner-shadow">
                <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
                <feOffset dx="2" dy="3"/>
                <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
                <feFlood flood-color="#8a7a60" flood-opacity="0.25"/>
                <feComposite in2="SourceGraphic" operator="in"/>
                <feMerge>
                  <feMergeNode/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <!-- Main ball body -->
            <circle cx="100" cy="100" r="90" fill="url(#ball-gradient)" filter="url(#leather)"/>

            <!-- Edge shading -->
            <circle cx="100" cy="100" r="90" fill="none" stroke="#b8a888" stroke-width="1.5" opacity="0.4"/>

            <!-- Highlight -->
            <ellipse cx="75" cy="70" rx="30" ry="22" fill="white" opacity="0.15" transform="rotate(-20 75 70)"/>

            <!-- Stitching - left curve -->
            <path d="M 68 22
                     C 50 45, 38 70, 42 100
                     C 46 130, 58 155, 78 178"
                  fill="none"
                  stroke="#cc2222"
                  stroke-width="2.2"
                  stroke-linecap="round"/>

            <!-- Stitch marks - left -->
            <g stroke="#cc2222" stroke-width="1.4" stroke-linecap="round" opacity="0.9">
              <line x1="60" y1="28" x2="72" y2="34"/>
              <line x1="54" y1="40" x2="66" y2="47"/>
              <line x1="48" y1="53" x2="61" y2="59"/>
              <line x1="44" y1="66" x2="57" y2="72"/>
              <line x1="42" y1="80" x2="55" y2="85"/>
              <line x1="42" y1="94" x2="55" y2="98"/>
              <line x1="43" y1="108" x2="56" y2="111"/>
              <line x1="46" y1="121" x2="59" y2="124"/>
              <line x1="50" y1="134" x2="63" y2="136"/>
              <line x1="56" y1="146" x2="68" y2="148"/>
              <line x1="62" y1="157" x2="74" y2="158"/>
              <line x1="70" y1="168" x2="82" y2="168"/>
            </g>

            <!-- Stitching - right curve -->
            <path d="M 132 22
                     C 150 45, 162 70, 158 100
                     C 154 130, 142 155, 122 178"
                  fill="none"
                  stroke="#cc2222"
                  stroke-width="2.2"
                  stroke-linecap="round"/>

            <!-- Stitch marks - right -->
            <g stroke="#cc2222" stroke-width="1.4" stroke-linecap="round" opacity="0.9">
              <line x1="140" y1="28" x2="128" y2="34"/>
              <line x1="146" y1="40" x2="134" y2="47"/>
              <line x1="152" y1="53" x2="139" y2="59"/>
              <line x1="156" y1="66" x2="143" y2="72"/>
              <line x1="158" y1="80" x2="145" y2="85"/>
              <line x1="158" y1="94" x2="145" y2="98"/>
              <line x1="157" y1="108" x2="144" y2="111"/>
              <line x1="154" y1="121" x2="141" y2="124"/>
              <line x1="150" y1="134" x2="137" y2="136"/>
              <line x1="144" y1="146" x2="132" y2="148"/>
              <line x1="138" y1="157" x2="126" y2="158"/>
              <line x1="130" y1="168" x2="118" y2="168"/>
            </g>

            <!-- Specular highlight -->
            <ellipse cx="68" cy="58" rx="14" ry="8" fill="white" opacity="0.2" transform="rotate(-30 68 58)"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="shadow"></div>
  </div>
</body>
</html>
