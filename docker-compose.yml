

services:
  backend:
    build: ./stat-diamond-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    volumes:
      - ./stat-diamond-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build: ./stat-diamond-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./stat-diamond-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
