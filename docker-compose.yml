services:
  backend:
    build: ./stat-diamond-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    volumes:
      - ./stat-diamond-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    network_mode: "bridge"  # Add this
    sysctls:  # Add this section
      - net.ipv6.conf.all.disable_ipv6=1
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build: ./stat-diamond-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./stat-diamond-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
